name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: C++ engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake g++ ninja-build

      - name: Set up JDK 21 (for JNI headers)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure
        working-directory: engine
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: engine
        run: cmake --build build --parallel

      - name: Test
        working-directory: engine
        run: ctest --test-dir build --output-on-failure

      - name: Bench (smoke run, 2k rows × 5 iters)
        working-directory: engine
        run: ./build/valengine_bench 2000 5

      - name: Upload native lib
        uses: actions/upload-artifact@v4
        with:
          name: valengine-native
          path: engine/build/libvalengine.*
          if-no-files-found: ignore

  cli:
    name: Java CLI
    runs-on: ubuntu-latest
    needs: engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Download native lib
        uses: actions/download-artifact@v4
        with:
          name: valengine-native
          path: cli/native

      - name: Test
        working-directory: cli
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Build fat JAR
        working-directory: cli
        run: ./gradlew shadowJar --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: lab-watcher-jar
          path: cli/build/libs/*-all.jar

  dashboard:
    name: Node dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package.json

      - name: Install
        working-directory: dashboard
        run: npm install --no-audit --no-fund

      - name: Lint (typecheck)
        working-directory: dashboard
        run: npm run lint

      - name: Build
        working-directory: dashboard
        run: npm run build

      - name: Test
        working-directory: dashboard
        run: npm test -- --ci
